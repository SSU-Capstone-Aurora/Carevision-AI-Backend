services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    networks:
      - carevision_network

  carevision-ai-green:
#    build:
#      context: . ## build Docker file location
#      dockerfile: Dockerfile ## build file name
    image: cv-green
    container_name: carevision-ai-green
    environment:
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      kafka-faststream:
        condition: service_healthy
    networks:
      - carevision_network

#  kafdrop:
#    image: obsidiandynamics/kafdrop:3.28.0
